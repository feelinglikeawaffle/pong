<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pong Single Player + Health</title>
<style>
  body { margin:0; background:#000; color:white; font-family:Arial; text-align:center; }
  canvas { background:#111; display:block; margin:40px auto; }
  #health {
    font-size:24px;
    margin-top:20px;
  }
</style>
</head>
<body>

<h1>PONG — Single Player</h1>
<div id="health">Player HP: 5 | Bot HP: 5</div>
<canvas id="game" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let playerHP = 5;
let botHP = 5;

const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let ball, leftPaddle, rightPaddle;

function resetBall(direction = 1) {
  ball = {
    x: canvas.width/2,
    y: canvas.height/2,
    dx: 5 * direction,
    dy: (Math.random()*4 - 2)
  };
}

function resetGame() {
  playerHP = 5;
  botHP = 5;
  updateHealth();
  resetBall();
}

function updateHealth() {
  document.getElementById("health").textContent =
    `Player HP: ${playerHP} | Bot HP: ${botHP}`;
}

function init() {
  leftPaddle = { x:20, y:250, w:15, h:100, dy:0 };
  rightPaddle = { x:canvas.width-35, y:250, w:15, h:100, dy:0 };
  resetBall();
  loop();
}

function update() {
  // Player movement
  leftPaddle.dy = keys["w"] ? -6 : keys["s"] ? 6 : 0;
  leftPaddle.y += leftPaddle.dy;
  leftPaddle.y = Math.max(0, Math.min(canvas.height - leftPaddle.h, leftPaddle.y));

  // Bot AI
  let target = ball.y - rightPaddle.h/2;
  rightPaddle.y += (target - rightPaddle.y) * 0.08;
  rightPaddle.y = Math.max(0, Math.min(canvas.height - rightPaddle.h, rightPaddle.y));

  // Move ball
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall bounce
  if (ball.y <= 0 || ball.y + 10 >= canvas.height) {
    ball.dy *= -1;
  }

  // Collision helper
  function collide(p) {
    return (
      ball.x < p.x + p.w &&
      ball.x + 10 > p.x &&
      ball.y < p.y + p.h &&
      ball.y + 10 > p.y
    );
  }

  // Left paddle hit
  if (collide(leftPaddle)) {
    ball.dx = Math.abs(ball.dx);
    ball.dy += (ball.y - (leftPaddle.y + leftPaddle.h/2)) * 0.1;
  }

  // Right paddle hit
  if (collide(rightPaddle)) {
    ball.dx = -Math.abs(ball.dx);
    ball.dy += (ball.y - (rightPaddle.y + rightPaddle.h/2)) * 0.1;
  }

  // Scoring / HP loss
  if (ball.x < 0) {
    playerHP--;
    updateHealth();
    if (playerHP <= 0) resetGame();
    else resetBall(1);
  }

  if (ball.x > canvas.width) {
    botHP--;
    updateHealth();
    if (botHP <= 0) resetGame();
    else resetBall(-1);
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Net
  ctx.fillStyle = "#333";
  for (let y=0; y<canvas.height; y+=30)
    ctx.fillRect(canvas.width/2 - 2, y, 4, 20);

  // Paddles
  ctx.fillStyle = "white";
  ctx.fillRect(leftPaddle.x, leftPaddle.y, leftPaddle.w, leftPaddle.h);
  ctx.fillRect(rightPaddle.x, rightPaddle.y, rightPaddle.w, rightPaddle.h);

  // Ball
  ctx.fillRect(ball.x, ball.y, 10, 10);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
</script>

</body>
</html>
