<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chaos Pong Deckbuilder – Controlled</title>
<style>
  body { margin:0; background:#000; color:#fff; font-family:Arial,sans-serif; text-align:center; }
  #menu, #cardList, #credits { margin-top:80px; }
  button {
    padding:10px 20px; margin:6px; font-size:18px;
    background:#222; color:#fff; border:2px solid #555; cursor:pointer;
  }
  button:hover { background:#444; }
  canvas { background:#111; display:none; margin:30px auto; }
  #hud { margin-top:10px; font-size:18px; display:none; }
  #cardOverlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.85);
    display:none; align-items:center; justify-content:center; flex-direction:column; color:#fff;
  }
  #cardContainer {
    display:flex; gap:12px; flex-wrap:wrap; justify-content:center; max-width:1000px;
  }
  .card {
    width:190px; padding:10px; border-radius:6px; border:2px solid #888;
    background:#222; cursor:pointer; text-align:left; font-size:14px;
  }
  .card h3 { margin:0 0 6px 0; font-size:16px; }
  .rarity-common { border-color:#aaa; }
  .rarity-rare { border-color:#4af; }
  .rarity-epic { border-color:#c4f; }
  .rarity-chaos { border-color:#f44; }
</style>
</head>
<body>

<div id="menu">
  <h1>Chaos Pong Deckbuilder</h1>
  <button onclick="startGame()">Start Game</button>
  <button onclick="showCardList()">Card List</button>
  <button onclick="showCredits()">Credits</button>
</div>

<div id="cardList" style="display:none;">
  <h2>Card List</h2>
  <div id="cardListContent"></div>
  <button onclick="backToMenu()">Back</button>
</div>

<div id="credits" style="display:none;">
  <h2>Credits</h2>
  <p>Pong + deckbuilder + just enough chaos.</p>
  <button onclick="backToMenu()">Back</button>
</div>

<div id="hud">
  <div id="hpText">Player HP: 5 | Bot HP: 5</div>
  <div id="infoText">Bounces: 0 | Next draft at: 4</div>
</div>

<canvas id="game" width="900" height="600"></canvas>

<div id="cardOverlay">
  <h2>Choose a Card</h2>
  <p>You pick one. Bot gets a random one too.</p>
  <div id="cardContainer"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameState = "menu";
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let playerHP, botHP;
let bounceCount, nextDraftAt;

let player, bot;
let balls = [];
let explosions = [];

let modifiers;

function defaultModifiers() {
  return {
    playerPaddleSpeedMult: 1,
    botPaddleSpeedMult: 1,
    ballSpeedMult: 1,
    ballSize: 10,
    playerShield: 0,
    botShield: 0,
    gravity: 0,
    spinFactor: 0.12,
    chaosBounce: false,
    fireTrail: false,
    botError: 0,
    timeScale: 1
  };
}

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("cardList").style.display = "none";
  document.getElementById("credits").style.display = "none";
  canvas.style.display = "block";
  document.getElementById("hud").style.display = "block";
  resetAll();
  gameState = "playing";
  requestAnimationFrame(loop);
}

function backToMenu() {
  gameState = "menu";
  canvas.style.display = "none";
  document.getElementById("hud").style.display = "none";
  document.getElementById("cardList").style.display = "none";
  document.getElementById("credits").style.display = "none";
  document.getElementById("menu").style.display = "block";
}

function showCardList() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("cardList").style.display = "block";
  renderCardList();
}

function showCredits() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("credits").style.display = "block";
}

function resetAll() {
  playerHP = 5;
  botHP = 5;
  bounceCount = 0;
  nextDraftAt = 4;

  modifiers = defaultModifiers();

  player = { x:20, y:250, w:15, h:100, dy:0 };
  bot = { x:canvas.width-35, y:250, w:15, h:100, dy:0 };

  balls = [];
  explosions = [];

  spawnBall(1);
  updateHUD();
}

function spawnBall(direction) {
  const baseSpeed = 3; // controlled
  const speed = baseSpeed * modifiers.ballSpeedMult;
  const angle = (Math.random()*0.6 - 0.3); // slight vertical variation
  balls.push({
    x: canvas.width/2 + (Math.random()*40 - 20),
    y: canvas.height/2 + (Math.random()*40 - 20),
    dx: speed * direction,
    dy: angle * speed,
    size: modifiers.ballSize
  });
}

function resetBalls(direction) {
  balls = [];
  spawnBall(direction);
}

/* CARD SYSTEM */

const cards = [
  { id:"paddle_up_small", name:"Paddle Growth I", rarity:"common",
    desc:"Increase your paddle height by 20%.",
    applyPlayer: () => { player.h *= 1.2; },
    applyBot: () => { bot.h *= 1.2; }
  },
  { id:"paddle_up_big", name:"Paddle Growth II", rarity:"rare",
    desc:"Increase your paddle height by 50%.",
    applyPlayer: () => { player.h *= 1.5; },
    applyBot: () => { bot.h *= 1.5; }
  },
  { id:"paddle_speed", name:"Quick Hands", rarity:"common",
    desc:"Increase paddle speed by 25%.",
    applyPlayer: () => { modifiers.playerPaddleSpeedMult *= 1.25; },
    applyBot: () => { modifiers.botPaddleSpeedMult *= 1.25; }
  },
  { id:"paddle_speed_big", name:"Hyper Reflexes", rarity:"rare",
    desc:"Increase paddle speed by 60%.",
    applyPlayer: () => { modifiers.playerPaddleSpeedMult *= 1.6; },
    applyBot: () => { modifiers.botPaddleSpeedMult *= 1.6; }
  },
  { id:"ball_fast", name:"Rage Orb", rarity:"rare",
    desc:"Increase ball speed by 30%.",
    applyPlayer: () => { modifiers.ballSpeedMult *= 1.3; },
    applyBot: () => { modifiers.ballSpeedMult *= 1.3; }
  },
  { id:"ball_fast_insane", name:"Lightspeed", rarity:"epic",
    desc:"Increase ball speed by 60%.",
    applyPlayer: () => { modifiers.ballSpeedMult *= 1.6; },
    applyBot: () => { modifiers.ballSpeedMult *= 1.6; }
  },
  { id:"ball_slow", name:"Calm Orb", rarity:"common",
    desc:"Reduce ball speed by 15%.",
    applyPlayer: () => { modifiers.ballSpeedMult *= 0.85; },
    applyBot: () => { modifiers.ballSpeedMult *= 0.85; }
  },
  { id:"ball_big", name:"Chunky Orb", rarity:"rare",
    desc:"Increase ball size by 50%.",
    applyPlayer: () => { modifiers.ballSize *= 1.5; balls.forEach(b=>b.size*=1.5); },
    applyBot: () => { modifiers.ballSize *= 1.5; balls.forEach(b=>b.size*=1.5); }
  },
  { id:"ball_small", name:"Needle Orb", rarity:"rare",
    desc:"Shrink ball size by 40%.",
    applyPlayer: () => { modifiers.ballSize *= 0.6; balls.forEach(b=>b.size*=0.6); },
    applyBot: () => { modifiers.ballSize *= 0.6; balls.forEach(b=>b.size*=0.6); }
  },
  { id:"heal1", name:"Small Heal", rarity:"common",
    desc:"+1 HP.",
    applyPlayer: () => { playerHP++; },
    applyBot: () => { botHP++; }
  },
  { id:"heal2", name:"Big Heal", rarity:"rare",
    desc:"+2 HP.",
    applyPlayer: () => { playerHP+=2; },
    applyBot: () => { botHP+=2; }
  },
  { id:"shield", name:"Shield Bubble", rarity:"rare",
    desc:"Gain 1 shield.",
    applyPlayer: () => { modifiers.playerShield++; },
    applyBot: () => { modifiers.botShield++; }
  },
  { id:"shield_big", name:"Fortress", rarity:"epic",
    desc:"Gain 3 shields.",
    applyPlayer: () => { modifiers.playerShield+=3; },
    applyBot: () => { modifiers.botShield+=3; }
  },
  { id:"chaos_bounce", name:"Chaos Bounce", rarity:"chaos",
    desc:"Ball bounces with random angles.",
    applyPlayer: () => { modifiers.chaosBounce = true; },
    applyBot: () => { modifiers.chaosBounce = true; }
  },
  { id:"fire", name:"Fire Trail", rarity:"epic",
    desc:"Balls leave fire and cause explosions.",
    applyPlayer: () => { modifiers.fireTrail = true; },
    applyBot: () => { modifiers.fireTrail = true; }
  },
  { id:"gravity", name:"Gravity Well", rarity:"rare",
    desc:"Increase gravity slightly.",
    applyPlayer: () => { modifiers.gravity += 0.03; },
    applyBot: () => { modifiers.gravity += 0.03; }
  },
  { id:"gravity_big", name:"Black Hole", rarity:"chaos",
    desc:"Increase gravity more.",
    applyPlayer: () => { modifiers.gravity += 0.07; },
    applyBot: () => { modifiers.gravity += 0.07; }
  },
  { id:"multiball", name:"Double Trouble", rarity:"epic",
    desc:"Spawn an extra ball.",
    applyPlayer: () => { spawnBall(Math.random()<0.5?-1:1); },
    applyBot: () => { spawnBall(Math.random()<0.5?-1:1); }
  },
  { id:"multiball3", name:"Orb Swarm", rarity:"chaos",
    desc:"Spawn 3 extra balls.",
    applyPlayer: () => { for(let i=0;i<3;i++) spawnBall(Math.random()<0.5?-1:1); },
    applyBot: () => { for(let i=0;i<3;i++) spawnBall(Math.random()<0.5?-1:1); }
  },
  { id:"time_slow", name:"Bullet Time", rarity:"rare",
    desc:"Slow everything by 20%.",
    applyPlayer: () => { modifiers.timeScale *= 0.8; },
    applyBot: () => { modifiers.timeScale *= 0.8; }
  },
  { id:"time_fast", name:"Overclock", rarity:"chaos",
    desc:"Speed everything up by 30%.",
    applyPlayer: () => { modifiers.timeScale *= 1.3; },
    applyBot: () => { modifiers.timeScale *= 1.3; }
  },
  { id:"bot_error", name:"Drunk Bot", rarity:"rare",
    desc:"Bot becomes inaccurate.",
    applyPlayer: () => { modifiers.botError += 15; },
    applyBot: () => { modifiers.botError += 15; }
  },
  { id:"hp_swap", name:"Life Swap", rarity:"chaos",
    desc:"Swap HP with bot.",
    applyPlayer: () => { let t=playerHP; playerHP=botHP; botHP=t; },
    applyBot: () => { let t=playerHP; playerHP=botHP; botHP=t; }
  },
  { id:"hp_steal", name:"Vampiric Hit", rarity:"epic",
    desc:"Steal 1 HP from opponent.",
    applyPlayer: () => { if(botHP>0){botHP--;playerHP++;} },
    applyBot: () => { if(playerHP>0){playerHP--;botHP++;} }
  }
];

function rarityClass(r) {
  if (r === "common") return "rarity-common";
  if (r === "rare") return "rarity-rare";
  if (r === "epic") return "rarity-epic";
  return "rarity-chaos";
}

function renderCardList() {
  const div = document.getElementById("cardListContent");
  div.innerHTML = "";
  cards.forEach(c => {
    const el = document.createElement("div");
    el.className = "card " + rarityClass(c.rarity);
    el.innerHTML = `<h3>${c.name}</h3><strong>${c.rarity}</strong><br>${c.desc}`;
    div.appendChild(el);
  });
}

function showCardDraft() {
  gameState = "draft";
  const overlay = document.getElementById("cardOverlay");
  const container = document.getElementById("cardContainer");
  overlay.style.display = "flex";
  container.innerHTML = "";

  const pool = [];
  const used = new Set();
  while (pool.length < 5 && pool.length < cards.length) {
    const idx = Math.floor(Math.random()*cards.length);
    if (!used.has(idx)) {
      used.add(idx);
      pool.push(cards[idx]);
    }
  }

  pool.forEach(card => {
    const el = document.createElement("div");
    el.className = "card " + rarityClass(card.rarity);
    el.innerHTML = `<h3>${card.name}</h3><strong>${card.rarity}</strong><br>${card.desc}`;
    el.onclick = () => {
      card.applyPlayer();
      const botCard = cards[Math.floor(Math.random()*cards.length)];
      botCard.applyBot();
      resetBalls(Math.random()<0.5?1:-1);
      overlay.style.display = "none";
      gameState = "playing";
      updateHUD();
    };
    container.appendChild(el);
  });
}

/* HUD / DAMAGE */

function updateHUD() {
  document.getElementById("hpText").textContent =
    `Player HP: ${playerHP} | Bot HP: ${botHP} | Shields P:${modifiers.playerShield} B:${modifiers.botShield}`;
  document.getElementById("infoText").textContent =
    `Bounces: ${bounceCount} | Next draft at: ${nextDraftAt}`;
}

function damagePlayer() {
  if (modifiers.playerShield > 0) { modifiers.playerShield--; return; }
  playerHP--;
  if (playerHP <= 0) resetAll();
}

function damageBot() {
  if (modifiers.botShield > 0) { modifiers.botShield--; return; }
  botHP--;
  if (botHP <= 0) resetAll();
}

/* LOOP */

function loop() {
  if (gameState === "playing") {
    update();
    draw();
  }
  requestAnimationFrame(loop);
}

function update() {
  const dt = modifiers.timeScale;

  // Player movement
  const pSpeed = 4 * modifiers.playerPaddleSpeedMult * dt;
  player.dy = keys["w"] ? -pSpeed : keys["s"] ? pSpeed : 0;
  player.y += player.dy;
  player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

  // Bot AI
  const bSpeed = 4 * modifiers.botPaddleSpeedMult * dt;
  let target = averageBallY() - bot.h/2;
  target += (Math.random()*2 - 1) * modifiers.botError;
  if (target > bot.y) bot.y += Math.min(bSpeed, target - bot.y);
  else bot.y -= Math.min(bSpeed, bot.y - target);
  bot.y = Math.max(0, Math.min(canvas.height - bot.h, bot.y));

  let scored = false;
  let scoreDir = 1;

  balls.forEach(ball => {
    ball.dy += modifiers.gravity * dt;
    ball.x += ball.dx * dt;
    ball.y += ball.dy * dt;

    // Wall bounce
    if (ball.y <= 0 || ball.y + ball.size >= canvas.height) {
      ball.dy *= -1;
      if (modifiers.chaosBounce) {
        ball.dx += (Math.random()*2 - 1);
        ball.dy += (Math.random()*2 - 1);
      }
    }

    // Paddle collisions
    if (collide(ball, player)) handlePaddleHit(ball, player, 1);
    if (collide(ball, bot)) handlePaddleHit(ball, bot, -1);

    // Scoring (sudden death)
    if (!scored) {
      if (ball.x + ball.size < 0) {
        damagePlayer();
        scored = true;
        scoreDir = 1;
      } else if (ball.x > canvas.width) {
        damageBot();
        scored = true;
        scoreDir = -1;
      }
    }
  });

  if (scored) {
    resetBalls(scoreDir);
  }

  // Explosions decay
  explosions.forEach(ex => ex.life -= dt);
  explosions = explosions.filter(e => e.life > 0);

  // Explosion forces
  explosions.forEach(ex => {
    balls.forEach(ball => {
      const cx = ball.x + ball.size/2;
      const cy = ball.y + ball.size/2;
      const dx = cx - ex.x;
      const dy = cy - ex.y;
      const dist2 = dx*dx + dy*dy;
      if (dist2 < ex.r*ex.r) {
        const dist = Math.sqrt(dist2) || 0.001;
        const f = 0.18; // push strength
        ball.dx += (dx/dist) * f;
        ball.dy += (dy/dist) * f;
      }
    });
    // nudge paddles slightly if inside blast
    const fP = 0.12;
    const px = player.x + player.w/2;
    const py = player.y + player.h/2;
    const dxP = px - ex.x;
    const dyP = py - ex.y;
    if (dxP*dxP + dyP*dyP < ex.r*ex.r) player.y += (dyP>0?fP:-fP);

    const bx = bot.x + bot.w/2;
    const by = bot.y + bot.h/2;
    const dxB = bx - ex.x;
    const dyB = by - ex.y;
    if (dxB*dxB + dyB*dyB < ex.r*ex.r) bot.y += (dyB>0?fP:-fP);
  });

  updateHUD();
}

function averageBallY() {
  if (balls.length === 0) return canvas.height/2;
  let sum = 0;
  balls.forEach(b => sum += b.y);
  return sum / balls.length;
}

function collide(ball, paddle) {
  return (
    ball.x < paddle.x + paddle.w &&
    ball.x + ball.size > paddle.x &&
    ball.y < paddle.y + paddle.h &&
    ball.y + ball.size > paddle.y
  );
}

function handlePaddleHit(ball, paddle, dir) {
  ball.dx = Math.abs(ball.dx) * dir;

  const center = paddle.y + paddle.h/2;
  const hitPos = (ball.y + ball.size/2) - center;

  if (modifiers.chaosBounce) {
    ball.dy = (Math.random()*6 - 3);
    ball.dx *= 1.15;
  } else {
    ball.dy += hitPos * modifiers.spinFactor;
  }

  if (modifiers.fireTrail) {
    explosions.push({ x:ball.x+ball.size/2, y:ball.y+ball.size/2, r:55, life:0.45 });
    if (paddle === bot) bot.h *= 0.985;
  }

  bounceCount++;
  if (bounceCount >= nextDraftAt) {
    nextDraftAt += 4;
    showCardDraft();
  }
}

/* DRAW */

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Net
  ctx.fillStyle = "#333";
  for (let y=0; y<canvas.height; y+=30)
    ctx.fillRect(canvas.width/2 - 2, y, 4, 20);

  // Explosions
  explosions.forEach(ex => {
    const alpha = ex.life / 0.45;
    const grad = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, ex.r);
    grad.addColorStop(0, `rgba(255,220,80,${alpha})`);
    grad.addColorStop(1, `rgba(255,80,0,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI*2);
    ctx.fill();
  });

  // Paddles
  ctx.fillStyle = "#fff";
  ctx.fillRect(player.x, player.y, player.w, player.h);
  ctx.fillRect(bot.x, bot.y, bot.w, bot.h);

  // Balls
  balls.forEach(ball => {
    if (modifiers.fireTrail) {
      ctx.fillStyle = "#f80";
      ctx.fillRect(ball.x-3, ball.y-3, ball.size+6, ball.size+6);
    }
    ctx.fillStyle = "#fff";
    ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
  });
}

// idle loop so game is ready
requestAnimationFrame(loop);
</script>

</body>
</html>
